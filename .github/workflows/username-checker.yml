name: Username Checker

on:
  schedule:
    - cron: "* * * * *"   # every minute
  workflow_dispatch:        # allow manual trigger too

concurrency:
  group: username-checker   # only ONE run of this workflow at a time
  cancel-in-progress: true  # if a new one fires, cancel the old one instantly

permissions:
  actions: write            # needed to cancel/delete other runs
  contents: write           # needed to commit results back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5      # safety cap — kills the job if it hangs

    steps:
      # ── 1. Cancel every OTHER in-progress run of this workflow ───────────
      - name: Cancel other in-progress runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflowId = context.workflow;   // e.g. "username-checker.yml"
            const currentRunId = context.runId;

            // List all runs for this workflow that are queued or in_progress
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: workflowId,
                status: "in_progress",
                per_page: 100,
              }
            );

            for (const run of runs) {
              if (run.id !== currentRunId) {
                console.log(`Cancelling run ${run.id}`);
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              }
            }

            // Also cancel any queued runs (they haven't started yet)
            const queued = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: workflowId,
                status: "queued",
                per_page: 100,
              }
            );

            for (const run of queued) {
              if (run.id !== currentRunId) {
                console.log(`Cancelling queued run ${run.id}`);
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              }
            }

      # ── 2. Checkout repo ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── 4. Run the checker ───────────────────────────────────────────────
      - name: Run username checker
        run: python checker.py

      # ── 5. Commit results back to the repo ──────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add available.txt taken.txt
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update results [$(date -u '+%Y-%m-%d %H:%M:%S UTC')]"
          git push
